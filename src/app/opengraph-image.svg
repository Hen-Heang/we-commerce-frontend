<!-- Social preview card — shown on LinkedIn / Twitter / iMessage when someone shares your URL.
     Next.js convention: this file at app/opengraph-image.svg is auto-served at /opengraph-image. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="50%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="180" fill="#A5B4FC" opacity="0.18"/>
  <circle cx="1100" cy="530" r="220" fill="#C7D2FE" opacity="0.22"/>

  <!-- Logo group, centered -->
  <g transform="translate(180, 180)">
    <!-- Icon -->
    <rect width="180" height="180" rx="40" fill="url(#iconBg)"/>
    <text x="90" y="102" text-anchor="middle" dominant-baseline="central"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-weight="900" font-size="110" fill="white" letter-spacing="-4">W</text>
    <circle cx="148" cy="148" r="10" fill="#34D399"/>

    <!-- Wordmark -->
    <text x="220" y="100" dominant-baseline="central"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-weight="900" font-size="96" letter-spacing="-3">
      <tspan fill="#0A0A0A">We</tspan>
      <tspan fill="#4338CA" dx="20">Commerce</tspan>
    </text>

    <!-- Tagline -->
    <text x="222" y="170"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-weight="500" font-size="32" fill="#52525B" letter-spacing="-0.5">
      Shop, save, and sell — all in one place.
    </text>
  </g>

  <!-- Tech stack badge row -->
  <g transform="translate(180, 480)" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="20">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="85" y="29" text-anchor="middle" fill="#27272A">Next.js 16</text>

    <rect x="186" y="0" width="180" height="44" rx="22" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="276" y="29" text-anchor="middle" fill="#27272A">Spring Boot 3</text>

    <rect x="382" y="0" width="180" height="44" rx="22" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="472" y="29" text-anchor="middle" fill="#27272A">PostgreSQL</text>

    <rect x="578" y="0" width="140" height="44" rx="22" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="648" y="29" text-anchor="middle" fill="#27272A">JWT Auth</text>
  </g>
</svg>
