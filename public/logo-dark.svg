<!-- We Commerce wordmark — dark mode variant (white "We", lighter indigo "Commerce") -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="8" width="64" height="64" rx="14" fill="url(#bg)"/>
  <text x="32" y="44" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900" font-size="38" fill="white" letter-spacing="-1.5">W</text>
  <circle cx="52" cy="60" r="3.5" fill="#34D399"/>

  <text x="80" y="44" dominant-baseline="central"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900" font-size="34" letter-spacing="-1.5">
    <tspan fill="#FAFAFA">We</tspan>
    <tspan fill="#A5B4FC" dx="8">Commerce</tspan>
  </text>
</svg>
