<!-- We Commerce Brand Logo — Modern iOS 25 Aesthetic -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Icon (Simulated) -->
  <rect x="10" y="15" width="70" height="70" rx="20" fill="url(#brandGradient)" />
  <text x="45" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-weight="900" font-size="44" fill="white" letter-spacing="-2">W</text>
  
  <!-- Status Dot -->
  <circle cx="80" cy="15" r="8" fill="white" />
  <circle cx="80" cy="15" r="6" fill="#34D399" filter="url(#glow)" />

  <!-- Wordmark -->
  <text x="100" y="50" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-weight="900" font-size="40" letter-spacing="-2.5">
    <tspan fill="#1c1c1e">We</tspan>
    <tspan fill="url(#brandGradient)" dx="5">Commerce</tspan>
  </text>
  
  <text x="102" y="75" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-weight="700" font-size="12" fill="#8e8e93" letter-spacing="2">LOCAL MARKETPLACE</text>
</svg>
