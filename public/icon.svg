<!-- We Commerce Brand Icon — Modern iOS 25 Aesthetic -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Icon (Simulated) -->
  <rect x="10" y="10" width="80" height="80" rx="22" fill="url(#brandGradient)" />
  <text x="50" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-weight="900" font-size="48" fill="white" letter-spacing="-2">W</text>
  
  <!-- Status Dot -->
  <circle cx="90" cy="10" r="9" fill="white" />
  <circle cx="90" cy="10" r="7" fill="#34D399" filter="url(#glow)" />
</svg>
