<!-- We Commerce icon — bold W mark in gradient indigo rounded square.
     Use anywhere you need a square logo: nav, social profile, README badge. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <text x="64" y="72" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900" font-size="76" fill="white" letter-spacing="-3">W</text>
  <!-- Subtle commerce accent — small dot in bottom-right -->
  <circle cx="100" cy="100" r="6" fill="#34D399"/>
</svg>
